<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Login - KL ESPORTS</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .login-box { 
            background: #111; padding: 35px; border-radius: 20px; 
            width: 320px; text-align: center; border: 1px solid #222; 
        }
        h2 { color: #ff4d00; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border-radius: 10px; border: 1px solid #333; 
            background: #1a1a1a; color: white; box-sizing: border-box; outline: none;
        }
        button { 
            width: 100%; padding: 14px; background: #ff4d00; 
            border: none; border-radius: 10px; color: black; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #statusMsg { font-size: 13px; margin-top: 15px; color: #ffbb00; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-box" id="loginUI">
    <h2>Host Login</h2>
    <input type="email" id="email" placeholder="Gmail ID">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="requestLogin()">Login / Request Access</button>
    <p id="statusMsg"></p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrHcONT6y0he3fzrtRGqdQMZfIMpGxcNo",
        authDomain: "kl-esports.firebaseapp.com",
        databaseURL: "https://kl-esports-default-rtdb.firebaseio.com",
        projectId: "kl-esports",
        storageBucket: "kl-esports.appspot.com",
        messagingSenderId: "440301376580",
        appId: "1:440301376580:web:fb0b8ae0df3fe096bd1811"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. SESSION CHECK (Already login aayavar dashboard-ilekku pokunnu)
    (function checkSession() {
        const hostStatus = localStorage.getItem("hostStatus");
        const hostEmail = localStorage.getItem("hostEmail");

        if (hostStatus === "approved" && hostEmail) {
            window.location.href = "dashboard.html"; // Ninte dashboard file name "dashboard.html" aano "host.html" aano ennu check cheyyuka
        }
    })();

    function requestLogin() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const statusMsg = document.getElementById('statusMsg');

        if(!email || !pass) return alert("All fields are required!");

        const userId = email.replace(/[.$#[\]]/g, "_");
        statusMsg.innerText = "Checking status...";

        // Firebase-il check cheyyunnu
        db.ref('host_requests/' + userId).once('value').then(snap => {
            const data = snap.val();

            if (data && data.status === "approved") {
                // Already approved aayavar direct login
                saveAndRedirect(data.email);
            } else if (data && data.status === "pending") {
                statusMsg.innerText = "Request already sent! Waiting for Admin...";
                startRealTimeListener(userId);
            } else {
                // Puthiya request ayakkunnu
                db.ref('host_requests/' + userId).set({
                    email: email,
                    password: pass,
                    status: "pending",
                    timestamp: Date.now()
                }).then(() => {
                    statusMsg.innerText = "Request Sent! Waiting for Admin...";
                    startRealTimeListener(userId);
                });
            }
        });
    }

    function startRealTimeListener(userId) {
        db.ref('host_requests/' + userId).on('value', snap => {
            const data = snap.val();
            if(data && data.status === "approved") {
                saveAndRedirect(data.email);
            } else if (data && data.status === "rejected") {
                document.getElementById('statusMsg').innerText = "Access Rejected!";
                document.getElementById('statusMsg').style.color = "red";
            }
        });
    }

    function saveAndRedirect(email) {
        const userId = email.replace(/[.$#[\]]/g, "_");

        // ⚠️ Ividayaanu nammal 'users' table update cheyyunnath. 
        // Ennaale Admin panel-il hoster list varukayullu.
        db.ref('users/' + userId).update({
            email: email,
            role: "hoster",
            gameName: email.split('@')[0], // Email-nte adya bhagam default name aayi idunnu
            status: "approved"
        }).then(() => {
            localStorage.setItem("hostStatus", "approved");
            localStorage.setItem("hostEmail", email);
            window.location.href = "dashboard.html"; 
        });
    }
</script>
</body>
</html>
